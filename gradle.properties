# Project-wide Gradle settings
# Exory File Manager - Professional Configuration

# JVM arguments
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx2048m

# Gradle daemon
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.priority=normal
org.gradle.workers.max=4
org.gradle.vfs.watch=true
org.gradle.caching.debug=false

# Kotlin compiler
kotlin.code.style=official
kotlin.incremental=true
kotlin.incremental.java=true
kotlin.incremental.js=true
kotlin.parallel.tasks.in.project=true
kotlin.mpp.stability.nowarn=true
kotlin.stdlib.default.dependency=false

# KAPT
kapt.incremental.apt=true
kapt.use.worker.api=true
kapt.include.compile.classpath=false
kapt.generate.stubs=false
kapt.verbose=false

# Android specific
android.useAndroidX=true
android.enableJetifier=true
android.jetifier.ignorelist=bcprov-jdk15on
android.nonTransitiveRClass=false
android.nonFinalResIds=false
android.defaults.buildfeatures.buildconfig=true
android.defaults.buildfeatures.aidl=true
android.defaults.buildfeatures.renderscript=false
android.defaults.buildfeatures.resvalues=true
android.defaults.buildfeatures.shaders=true

# Compile options
android.compileSdkVersion=34
android.minSdkVersion=24
android.targetSdkVersion=34
android.buildToolsVersion=34.0.0

# Build cache
android.enableBuildCache=true
android.buildCacheDir=build-cache/

# R8/ProGuard
android.enableR8=true
android.enableR8.libraries=true
android.enableR8.fullMode=true
android.enableR8.desugaring=true
android.enableD8.desugaring=true
android.experimental.d8ApiLevelApiGuess=true

# Data binding
android.databinding.incremental=true
android.databinding.enableV2=true

# View binding
android.viewBinding.enabled=true

# Compose
android.experimental.compose.enabled=true
android.compose.compiler.enabled=true
org.jetbrains.compose.experimental.enable=true

# Room
room.incremental=true
room.schemaLocation=app/schemas

# Lint
android.lintOptions.abortOnError=true
android.lintOptions.checkAllWarnings=true
android.lintOptions.warningsAsErrors=true
android.lintOptions.htmlOutput=build/reports/lint/lint.html
android.lintOptions.xmlOutput=build/reports/lint/lint.xml

# Test options
android.testOptions.unitTests.returnDefaultValues=true
android.testOptions.unitTests.includeAndroidResources=true
android.testOptions.unitTests.isDefault=true

# Build features
android.buildFeatures.buildConfig=true
android.buildFeatures.viewBinding=true
android.buildFeatures.dataBinding=true
android.buildFeatures.compose=true
android.buildFeatures.mlModelBinding=false
android.buildFeatures.prefab=false
android.buildFeatures.prefabPublishing=false

# AGP optimizations
android.experimental.legacyTransform.forceNonIncremental=false
android.experimental.disableResourceOptimization=false
android.experimental.enableNewResourceShrinker=true
android.experimental.enableNewResourceShrinker.preciseShrinking=true

# Resource optimizations
android.resourceOptimizations.enabled=true
android.enableResourceOptimizations=true

# Native build
android.bundle.enableUncompressedNativeLibs=false
android.experimental.ndk.disable.clearUnresolved=false

# Dependency resolution
android.dependencyResolution.atom.skip=false

# Version catalog
systemProp.version.catalog.update.verbose=true
systemProp.version.catalog.update.keep.versions=true

# HTTP proxy settings (uncomment if needed)
# systemProp.http.proxyHost=proxy.example.com
# systemProp.http.proxyPort=8080
# systemProp.http.proxyUser=
# systemProp.http.proxyPassword=
# systemProp.https.proxyHost=proxy.example.com
# systemProp.https.proxyPort=8080
# systemProp.https.proxyUser=
# systemProp.https.proxyPassword=

# Gradle properties
systemProp.org.gradle.internal.http.socketTimeout=120000
systemProp.org.gradle.internal.http.connectionTimeout=120000
systemProp.file.encoding=UTF-8

# Kotlin compiler args
kotlin.stdlib.default.dependency=false
kotlin.freeCompilerArgs=-Xjsr305=strict,-Xopt-in=kotlin.RequiresOptIn,-Xjvm-default=all,-Xcontext-receivers

# Memory for Gradle
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseParallelGC -XX:ParallelGCThreads=4

# AndroidX multi-dex
android.enableDexingArtifactTransform=true
android.useMinimalLandfillForDex=false

# Compiler warnings
kotlin.freeCompilerArgs += -Xskip-prerelease-check

# KSP
ksp.incremental=true
ksp.incremental.log=false

# Doctor plugin
doctor.warnWhenNotUsingParallelGC=true
doctor.disallowMultipleDaemons=true
doctor.disallowSyncExecution=true
doctor.androidProjectPropertyMinimumMemorySize=1024

# SDK Manager
android.sdk.channel=stable
android.sdk.maxSdkVersion=34

# Security
android.keystore.path=keystore/debug.keystore
android.keystore.alias=androiddebugkey
android.keystore.storePassword=android
android.keystore.keyPassword=android

# Module specific
android.disableAutomaticComponentCreation=true

# Build scan
org.gradle.scan.uploadInBackground=false

# Version info
VERSION_NAME=1.0.0
VERSION_CODE=1
