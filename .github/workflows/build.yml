name: Build Exory File Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --info 2>&1 | grep -A5 "NullPointerException\|\[ksp\]\|error:" | head -80
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-log
          path: build.log
          retention-days: 7
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Exory-File-Manager-Debug
          path: "**/*.apk"
          retention-days: 30
