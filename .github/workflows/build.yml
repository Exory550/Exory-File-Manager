name: Build Exory File Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --debug 2>&1 | grep -E "error:|warning:|Error|Exception|Could not" | head -100

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Exory-File-Manager-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
